[claude]
plan = "max5"
# Weekly reset time shown in --detail output. Percentages still use a
# rolling 7-day window, but this is the wall-clock time your Max cycle
# nominally resets at (matches the claude.ai dashboard "Resets ..." label).
# weekday: 0=Monday ... 6=Sunday. Hour is in your system's local timezone.
weekly_reset_weekday = 0
weekly_reset_hour_local = 22
# Which window drives the statusbar segment. "max" (default) picks the
# higher of 5h/7d; pin to "5h" or "7d" to force one. Falls back to "max"
# if the pinned window is expired or missing.
# Allowed: "max" | "5h" | "7d"
bar_window = "max"
# Local JSONL effective tokens = billed input/output/cache-write tokens plus
# cache_read_weight × cache-read tokens. --detail prints the same breakdown.
# Default 1.0 counts cache reads at full weight.
cache_read_weight = 1.0

[claude.limits.pro]
tokens_5h = 25000000
tokens_weekly = 560000000
messages_weekly = 250

[openai]
enabled = true
browser = "zen"
# Statusbar driving window. "max" (default) picks the higher of primary/weekly.
# "primary" matches the ChatGPT web UI. Falls back to "max" if the pinned
# window is missing.
# Allowed: "max" | "primary" | "weekly"
bar_window = "max"

[kimi]
enabled = true
# Supported: zen, firefox, chrome, chromium, brave, vivaldi, edge, opera
browser = "zen"
# Statusbar driving window. "max" (default) picks the higher of 5h/weekly.
# Allowed: "max" | "5h" | "weekly"
bar_window = "max"

[opencode]
# OpenCode (sst/opencode) Zen usage tracker. Reads ~/.local/share/opencode/opencode.db
# and aggregates assistant tokens for providerID="opencode" into fixed calendar
# windows: 5h UTC-epoch blocks, Monday 00:00 UTC weeks, and month starts at
# the 1st 00:00 UTC. There is no public OpenCode quota API, so percentage is
# computed against the limit_tokens you configure here. Statusbar letter: `e`.
# Zero usage in both 5h and weekly windows renders as `e idle`, distinct from
# an active 0%. Monthly tokens are still shown when present.
enabled = false
provider_id = "opencode"
db_path = ""                    # empty = ~/.local/share/opencode/opencode.db
# Window sizes are fixed by the calendar (5h block / week / month) and are not
# configurable. Only the token limits below are tunable.
primary_limit_tokens = 25000000
weekly_limit_tokens = 560000000
monthly_limit_tokens = 0        # 0 = monthly percentage hidden, tokens still shown
# Statusbar driving window. "max" (default) picks the highest of 5h/weekly/monthly.
# Allowed: "max" | "5h" | "weekly" | "monthly"
bar_window = "max"

[opencode-go]
# OpenCode Go usage tracker. Same fixed calendar windows and idle rule as
# [opencode], but filtered by providerID="opencode-go". Statusbar letter: `g`.
# db_path empty = ~/.local/share/opencode/opencode.db (same default as [opencode]).
enabled = false
provider_id = "opencode-go"
db_path = ""
# Window sizes are fixed by the calendar (same rule as [opencode]).
primary_limit_tokens = 25000000
weekly_limit_tokens = 560000000
monthly_limit_tokens = 0        # 0 = monthly percentage hidden, tokens still shown
# Statusbar driving window. "max" (default) picks the highest of 5h/weekly/monthly.
# Allowed: "max" | "5h" | "weekly" | "monthly"
bar_window = "max"

[cache]
ttl_seconds = 300

[statusbar]
# Default set of providers shown in --statusbar / --detail / --json
# when --only is not passed. CLI flag overrides this.
providers = ["claude", "chatgpt", "kimi"]
